name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install hid psutil pystray Pillow pyinstaller

    - name: Build EXE using Pyinstaller
      run: |
        pyinstaller --onefile --noconsole --uac-admin main.py

    - name: Upload Temporary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Macropad-M33
        path: dist/main.exe
        retention-days: 7
